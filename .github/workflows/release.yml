name: Build, Test and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # older versions of OS are used for wider accessibility
          # if they stop being compatible with newer OS versions - update them
          - os: ubuntu-22.04
            artifact_name: cremniy-linux-${{ github.ref_name }}
          - os: macos-14
            artifact_name: cremniy-macos-${{ github.ref_name }}
          - os: windows-2022
            artifact_name: cremniy-windows-${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt (Linux/macOS)
        if: runner.os != 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.3'
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 libfuse2 file imagemagick

      - name: Download linuxdeploy tools
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux) - AppImage
        if: runner.os == 'Linux'
        run: |
          echo -e "[Desktop Entry]\nType=Application\nName=Cremniy\nExec=cremniy\nIcon=cremniy\nCategories=Utility;" > cremniy.desktop

          convert src/resources/icons/icon.png -resize 256x256 cremniy.png

          export QML_SOURCES_PATHS=${{ github.workspace }}/src
          export QMAKE=$Qt6_DIR/bin/qmake
          export LD_LIBRARY_PATH=$Qt6_DIR/lib:$LD_LIBRARY_PATH

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable build/cremniy \
            --desktop-file cremniy.desktop \
            --icon-file cremniy.png \
            --plugin qt \
            --output appimage
          mv Cremniy-*.AppImage ${{ matrix.artifact_name }}.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          if (!(Test-Path "build/Release/cremniy.exe")) {
            throw "build/Release/cremniy.exe was not produced"
          }
          Copy-Item build/Release/cremniy.exe package/
          & "$env:Qt6_DIR/bin/windeployqt.exe" package/cremniy.exe
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp -r build/cremniy.app package/
          macdeployqt package/cremniy.app
          codesign --remove-signature package/cremniy.app
          codesign --force --deep --sign - package/cremniy.app
          cd package
          tar -czf ../${{ matrix.artifact_name }}.tar.gz cremniy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.AppImage
          if-no-files-found: error

  test:
    needs: build
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # newer OS versions - test if they are compatible with older OS builds
          - os: ubuntu-24.04
            artifact_name: cremniy-linux-${{ github.ref_name }}
          - os: macos-15
            artifact_name: cremniy-macos-${{ github.ref_name }}
          - os: windows-2025
            artifact_name: cremniy-windows-${{ github.ref_name }}

    steps:
      - name: Get executables
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact


      - name: Test executable (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 libfuse2 file imagemagick

          chmod +x ./artifact/${{ matrix.artifact_name }}.AppImage
          xvfb-run ./artifact/${{ matrix.artifact_name }}.AppImage &
          sleep 3
          pkill cremniy
        # pkill must fail if application failed to start (i.e. already died)

      - name: Test executable (macOS)
        if: runner.os == 'macOS'
        run: |
          tar xvf ./artifact/${{ matrix.artifact_name }}.tar.gz
          ./cremniy.app/Contents/MacOS/cremniy &
          sleep 3
          pkill cremniy

      - name: Test executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Expand-Archive -Path "artifact\${{ matrix.artifact_name }}.zip" -DestinationPath artifact
          $p = Start-Process -FilePath "artifact\cremniy.exe" -PassThru
          Start-Sleep -Seconds 3
          if ($p.HasExited) {
            throw "Process exited early (code: $($p.ExitCode))"
          }
          Stop-Process -Id $p.Id


  release:
    name: Create Release
    needs: test
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
