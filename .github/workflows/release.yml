name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          cache: true
      
      - name: Install Qt (Linux/macOS)
        if: runner.os != 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 \
            libxcb-xkb1 libdbus-1-3 \
            libfuse2 file imagemagick

      - name: Download linuxdeploy tools
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
      
      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux) - AppImage
        if: runner.os == 'Linux'
        run: |
          echo -e "[Desktop Entry]\nType=Application\nName=Cremniy\nExec=cremniy\nIcon=cremniy\nCategories=Utility;" > cremniy.desktop

          convert src/resources/icons/icon.png -resize 256x256 cremniy.png

          export QML_SOURCES_PATHS=${{ github.workspace }}/src
          export QMAKE=$Qt6_DIR/bin/qmake
          export LD_LIBRARY_PATH=$Qt6_DIR/lib:$LD_LIBRARY_PATH

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable build/cremniy \
            --desktop-file cremniy.desktop \
            --icon-file cremniy.png \
            --plugin qt \
            --output appimage
          mv Cremniy-*.AppImage cremniy-linux-${{ github.ref_name }}.AppImage || mv cremniy-*.AppImage cremniy-linux-${{ github.ref_name }}.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          if (!(Test-Path "build/Release/cremniy.exe")) {
            throw "build/Release/cremniy.exe was not produced"
          }
          Copy-Item build/Release/cremniy.exe package/
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" package\cremniy.exe
          Compress-Archive -Path package/* -DestinationPath cremniy-windows-${{ github.ref_name }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp -r build/cremniy.app package/
          macdeployqt package/cremniy.app
          cd package
          tar -czf ../cremniy-macos-${{ github.ref_name }}.tar.gz cremniy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cremniy-${{ runner.os }}-${{ github.ref_name }}
          path: |
            cremniy-linux-${{ github.ref_name }}.AppImage
            cremniy-windows-${{ github.ref_name }}.zip
            cremniy-macos-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
